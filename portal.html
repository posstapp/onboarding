<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — posst.app</title>
<link rel="icon" href="https://posst.app/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="https://posst.app/favicon-32x32.png">
<link rel="apple-touch-icon" href="https://posst.app/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1648FF;--blue-dim:#E8EEFF;--blue-dark:#0f35d4;
  --cream:#FFFAF4;--ink:#0F0E17;--ink-mid:#4A4860;--ink-light:#9896A8;
  --border:#E4DFD6;--white:#FFFFFF;--green:#16A34A;--green-dim:#F0FDF4;
  --red:#DC2626;--red-dim:#FEF2F2;--amber:#D97706;--amber-dim:#FFFBEB;
  --sans:'DM Sans',system-ui,sans-serif;--serif:'DM Serif Display',Georgia,serif;
}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(255,250,244,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo img{height:28px;display:block}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-name{font-size:13px;font-weight:600;color:var(--ink-mid)}
.nav-signout{font-size:12px;color:var(--ink-light);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--sans)}

/* ── LAYOUT ── */
.page{padding:80px 16px 40px;max-width:600px;margin:0 auto}

/* ── LOADING ── */
.loading{text-align:center;padding:80px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--ink-mid)}

/* ── ACCOUNT HEADER ── */
.acct-header{background:var(--blue);border-radius:16px;padding:24px;margin-bottom:20px;color:white}
.acct-biz{font-family:var(--serif);font-size:22px;margin-bottom:6px}
.acct-meta{font-size:12px;opacity:0.75;display:flex;align-items:center;gap:8px}
.acct-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.acct-badge.pro{background:rgba(255,255,255,0.25)}

/* ── SECTION CARD ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none}
.card-header-left{display:flex;align-items:center;gap:10px}
.card-icon{font-size:18px;width:32px;text-align:center}
.card-title{font-size:14px;font-weight:700;color:var(--ink)}
.card-subtitle{font-size:12px;color:var(--ink-light);margin-top:2px}
.card-chevron{font-size:12px;color:var(--ink-light);transition:transform 0.2s}
.card-chevron.open{transform:rotate(180deg)}
.card-body{padding:0 20px 20px;display:none}
.card-body.open{display:block}
.card-divider{height:1px;background:var(--border);margin:0 20px}

/* ── STATUS PILLS ── */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.pill-green{background:var(--green-dim);color:var(--green)}
.pill-blue{background:var(--blue-dim);color:var(--blue)}
.pill-amber{background:var(--amber-dim);color:var(--amber)}
.pill-red{background:var(--red-dim);color:var(--red)}

/* ── PLATFORM ROWS ── */
.platform-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.platform-row:last-child{border-bottom:none}
.platform-info{display:flex;align-items:center;gap:10px}
.platform-icon{font-size:18px}
.platform-name{font-size:13px;font-weight:600;color:var(--ink)}
.platform-status{font-size:11px;color:var(--ink-light);margin-top:1px}

/* ── SCHEDULE GRID ── */
.days-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.day-toggle{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:700;color:var(--ink-light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:var(--sans)}
.day-toggle.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}
.time-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}

/* ── THEME ROWS ── */
.theme-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.theme-row:last-child{border-bottom:none}
.theme-day{font-size:13px;font-weight:700;color:var(--ink);width:40px;flex-shrink:0}

/* ── FORM ELEMENTS ── */
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--sans);color:var(--ink);background:white;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--blue)}
.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);color:var(--ink);background:white;outline:none;cursor:pointer}
.form-label{font-size:12px;font-weight:600;color:var(--ink-mid);margin-bottom:6px;display:block}
.form-hint{font-size:11px;color:var(--ink-light);margin-top:4px}
.form-group{margin-bottom:14px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;border:none;transition:all 0.15s;text-decoration:none}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:white;color:var(--ink);border:1.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1.5px solid #FECACA}
.btn-warning{background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D}
.btn-success{background:var(--green-dim);color:var(--green);border:1.5px solid #BBF7D0}
.btn-full{width:100%;justify-content:center;padding:12px}
.btn-sm{padding:7px 14px;font-size:12px}
.btn:disabled{opacity:0.6;cursor:not-allowed}

/* ── INFO BOXES ── */
.info-box{border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.6;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.info-box-green{background:var(--green-dim);border:1px solid #BBF7D0;color:#166534}
.info-box-amber{background:var(--amber-dim);border:1px solid #FDE68A;color:#92400e}
.info-box-blue{background:var(--blue-dim);border:1px solid #BFDBFE;color:#1e40af}
.info-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* ── SAVE ROW ── */
.save-row{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.save-msg{font-size:12px;color:var(--green);font-weight:600;display:none}
.save-msg.show{display:block}

/* ── DANGER ZONE ── */
.danger-zone{background:var(--red-dim);border:1px solid #FECACA;border-radius:14px;padding:20px;margin-top:8px}
.danger-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px}
.danger-desc{font-size:12px;color:#991b1b;line-height:1.6;margin-bottom:14px}
.danger-actions{display:flex;gap:10px;flex-wrap:wrap}

/* ── SPINNER IN BTN ── */
.btn-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn-spinner.show{display:block}

/* ── DRIVE STATUS ── */
.drive-connected{background:var(--green-dim);border:1px solid #BBF7D0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.drive-url{font-size:11px;color:var(--ink-light);margin-top:3px;word-break:break-all}

/* ── BUSINESS SWITCHER ── */
.nav-switcher{position:relative;display:inline-block}
.nav-switcher-btn{font-size:13px;font-weight:600;color:var(--ink);background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:6px;transition:border-color 0.15s}
.nav-switcher-btn:hover{border-color:var(--blue)}
.nav-switcher-btn .sw-caret{font-size:9px;color:var(--ink-light);transition:transform 0.2s}
.nav-switcher-btn.open .sw-caret{transform:rotate(180deg)}
.nav-switcher-menu{position:absolute;top:calc(100% + 8px);right:0;min-width:220px;background:white;border:1.5px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:300;overflow:hidden;display:none}
.nav-switcher-menu.open{display:block}
.sw-item{padding:11px 16px;font-size:13px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background 0.1s}
.sw-item:hover{background:var(--blue-dim)}
.sw-item.active{background:var(--blue-dim);font-weight:600}
.sw-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sw-item-status{font-size:10px;color:var(--ink-light);flex-shrink:0}
.sw-item-status.active{color:var(--green)}
.sw-divider{height:1px;background:var(--border);margin:4px 0}
.sw-add{padding:11px 16px;font-size:13px;color:var(--blue);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s}
.sw-add:hover{background:var(--blue-dim)}
/* ── WELCOME CARD ── */
.welcome-card{background:linear-gradient(135deg,#1648FF 0%,#4B6BFF 100%);border-radius:16px;padding:24px;margin-bottom:14px;color:white}
.welcome-title{font-family:var(--serif);font-size:20px;margin-bottom:8px}
.welcome-desc{font-size:13px;opacity:0.85;line-height:1.5;margin-bottom:16px}
.welcome-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.welcome-step{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}
.welcome-step-num{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.welcome-step.done .welcome-step-num{background:rgba(255,255,255,0.4)}
.welcome-step.done{opacity:0.6;text-decoration:line-through}
.welcome-dismiss{font-size:12px;opacity:0.7;cursor:pointer;text-decoration:underline;background:none;border:none;color:white;font-family:var(--sans)}

/* ── STYLE GALLERY ── */
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.style-card{position:relative;border-radius:10px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:all 0.15s;background:var(--white)}
.style-card:hover{border-color:var(--ink-light)}
.style-card.selected{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-dim)}
.style-card.locked{opacity:0.55;cursor:default}
.style-card.locked:hover{border-color:var(--border)}
.style-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--border)}
.style-img-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--border);font-size:28px}
.style-name{font-size:11px;font-weight:600;padding:6px 8px;text-align:center;color:var(--ink)}
.style-check{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--blue);color:white;display:none;align-items:center;justify-content:center;font-size:11px}
.style-card.selected .style-check{display:flex}
.style-lock{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;display:flex;align-items:center;justify-content:center;font-size:10px}
.style-upgrade{text-align:center;margin-bottom:16px}

/* ── LOGO UPLOAD ── */
.logo-upload-area{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:12px}
.logo-upload-area:hover{border-color:var(--blue);background:var(--blue-dim)}
.logo-upload-area.has-logo{border-style:solid;cursor:default}
.logo-preview{max-height:60px;max-width:200px;margin:0 auto 8px;display:block}
.logo-upload-text{font-size:13px;color:var(--ink-mid)}
.logo-upload-icon{font-size:28px;margin-bottom:6px}
.logo-upload-hint{font-size:11px;color:var(--ink-light);margin-top:4px}
.logo-replace-btn{font-size:12px;color:var(--blue);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--sans);margin-top:8px}

/* ── FOOTER ── */
.footer{text-align:center;padding:32px 16px;font-size:11px;color:var(--ink-light)}
.footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>

<nav class="nav">
  <a href="https://posst.app" class="nav-logo">
    <img src="https://posst.app/posst_logo_dark.png" alt="posst.app">
  </a>
  <div class="nav-right">
    <div class="nav-switcher" id="nav-switcher">
      <button class="nav-switcher-btn" id="nav-switcher-btn" onclick="toggleSwitcher()" style="display:none">
        <span id="nav-biz-name"></span>
        <span class="sw-caret">▼</span>
      </button>
      <span class="nav-name" id="nav-biz-name-single"></span>
      <div class="nav-switcher-menu" id="nav-switcher-menu"></div>
    </div>
    <button class="nav-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="page" id="page">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading your account...</div>
  </div>
  <div id="dashboard" style="display:none"></div>
</div>

<div class="footer">
  <a href="https://posst.app">posst.app</a> &nbsp;·&nbsp;
  <a href="mailto:chief@posst.app">chief@posst.app</a>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGmzB2ym3jcb2f7MqWUBtMgIU1veoF_NLoDhRYhFWBrilZIaURPHkuP8g68UTjBxJ95g/exec";
const PROXY_URL = "https://connect.posst.app/proxy";
const VPS_URL = "https://connect.posst.app";

const DAY_THEMES = ['Service Spotlight','Tip / Advice','Transformation Story','Seasonal / Local','Booking Nudge','Fun Fact','Community Love'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ALL_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let clientData = null;
let phone = '';
let busy = false;

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  // Get phone from URL or sessionStorage
  const params = new URLSearchParams(window.location.search);
  phone = params.get('phone') || sessionStorage.getItem('posst_portal_phone') || '';

  if (!phone) {
    // No phone — redirect to login
    window.location.href = 'https://onboarding.posst.app?mode=login';
    return;
  }
  sessionStorage.setItem('posst_portal_phone', phone);

  await loadAccount();
});

async function loadAccount() {
  try {
    const resp = await fetch(PROXY_URL + '/portal_lookup', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ phone })
    });
    const result = await resp.json();

    if (result.status !== 'success') {
      showError('Account not found. Please sign in again.');
      return;
    }

    clientData = result.data;
    const allClients = result.data.all_clients || [];
    const bizName = clientData.business_name || '';

    if (allClients.length > 1 || clientData.draft_prospect) {
      // Multiple businesses, or a resumable draft signup — show switcher dropdown
      document.getElementById('nav-biz-name').textContent = bizName;
      document.getElementById('nav-switcher-btn').style.display = 'flex';
      document.getElementById('nav-biz-name-single').style.display = 'none';
      buildSwitcherMenu(allClients, clientData.client_id, clientData.draft_prospect);
    } else {
      // Single business — plain name
      document.getElementById('nav-biz-name-single').textContent = bizName;
      document.getElementById('nav-switcher-btn').style.display = 'none';
      document.getElementById('nav-biz-name-single').style.display = 'inline';
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  } catch(e) {
    showError('Connection error. Please try again.');
  }
}

function showError(msg) {
  document.getElementById('loading').innerHTML = `<p style="color:var(--red);font-size:14px">${msg}</p><br><a href="https://onboarding.posst.app?mode=login" class="btn btn-primary btn-sm">Sign in again</a>`;
}

function signOut() {
  sessionStorage.removeItem('posst_portal_phone');
  window.location.href = 'https://posst.app';
}

// ── BUSINESS SWITCHER ──────────────────────────────────────
function buildSwitcherMenu(allClients, activeClientId, draftProspect) {
  const menu = document.getElementById('nav-switcher-menu');
  if (!menu) return;
  const items = allClients.map(c => {
    const isActive = c.client_id === activeClientId;
    const statusLabel = c.status === 'Active' ? 'Active' : c.status;
    return `<div class="sw-item ${isActive?'active':''}" onclick="switchBusiness('${c.client_id}')">
      <span class="sw-item-name">${esc(c.business_name)}</span>
      <span class="sw-item-status ${c.status==='Active'?'active':''}">${statusLabel}</span>
    </div>`;
  }).join('');
  const draftItem = draftProspect ? `<div class="sw-item" style="border-style:dashed;opacity:0.85" onclick="resumeDraft()">
      <span class="sw-item-name">${esc(draftProspect.business_name)} <span style="font-size:11px;color:var(--ink-light)">(unfinished)</span></span>
      <span class="sw-item-status" style="color:var(--blue)">↻ Resume signup</span>
    </div>` : '';
  menu.innerHTML = items + draftItem +
    '<div class="sw-divider"></div>' +
    '<div class="sw-add" onclick="addNewBusiness()">➕ Add another business</div>';
}

function resumeDraft() {
  const encodedPhone = encodeURIComponent(phone);
  window.location.href = `https://onboarding.posst.app?resume=1&phone=${encodedPhone}`;
}

function toggleSwitcher() {
  const btn = document.getElementById('nav-switcher-btn');
  const menu = document.getElementById('nav-switcher-menu');
  if (!btn || !menu) return;
  const isOpen = menu.classList.contains('open');
  menu.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  if (!isOpen) {
    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', function handler(e) {
        if (!document.getElementById('nav-switcher').contains(e.target)) {
          menu.classList.remove('open');
          btn.classList.remove('open');
        }
        document.removeEventListener('click', handler);
      });
    }, 0);
  }
}

async function switchBusiness(clientId) {
  // Close menu
  document.getElementById('nav-switcher-menu')?.classList.remove('open');
  document.getElementById('nav-switcher-btn')?.classList.remove('open');
  if (clientId === clientData.client_id) return;
  // Load the selected client directly
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  try {
    // NOTE: previously called GET /client/:id, which returns the raw
    // Supabase row — that endpoint never computes fb_connected/ig_connected/
    // gbp_connected at all (those are only derived inside portal_lookup's
    // fmt()). So switching businesses silently lost connection-status data
    // entirely: cd.fb_connected was just undefined, making the Platforms
    // card show "None connected" regardless of actual connection state.
    // Confirmed live against posst.app on 2026-06-21. portal_lookup
    // already supports filtering by client_id, so reuse it directly
    // instead of duplicating the connection-status logic in two endpoints.
    const resp = await fetch(PROXY_URL + '/portal_lookup', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ phone, client_id: clientId })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      // Merge all_clients from current clientData so switcher stays populated
      result.data.all_clients = clientData.all_clients || [];
      clientData = result.data;
      document.getElementById('nav-biz-name').textContent = clientData.business_name || '';
      buildSwitcherMenu(clientData.all_clients, clientId, clientData.draft_prospect);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderDashboard();
    } else {
      showError('Could not load that business. Please try again.');
    }
  } catch(e) {
    showError('Connection error. Please try again.');
  }
}

function addNewBusiness() {
  const encodedPhone = encodeURIComponent(phone);
  window.location.href = `https://onboarding.posst.app?mode=new_business&phone=${encodedPhone}`;
}

// ── RENDER DASHBOARD ──────────────────────────────────────
function renderDashboard() {
  window._schedDays = null; // reset so toggleSchedDay re-reads from clientData
  const cd = clientData;
  const isPro = (cd.plan || '').toLowerCase() === 'pro';
  const isActive = cd.status === 'Active';

  // Parse posting days
  const postingDays = (cd.posting_days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d => d.trim());

  // Parse platforms
  // NOTE: hasFB/hasIG/hasGBP must reflect whether the platform is actually
  // OAuth-connected (fb_page_id/ig_business_id/gbp_location_id populated),
  // not which platforms were originally selected during onboarding signup.
  // Previously these were derived from cd.platforms (the static signup

// ── HELPERS ───────────────────────────────────────────────
function esc(s) { return !s ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chevron-'+id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

// ── SCHEDULE ──────────────────────────────────────────────
let schedDays = (clientData?.posting_days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d=>d.trim());

function toggleSchedDay(day, btn) {
  // Always read from buttons directly to avoid stale state
  if (!window._schedDays) {
    window._schedDays = (clientData?.posting_days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d=>d.trim());
  }
  const idx = window._schedDays.indexOf(day);
  if (idx > -1) {
    if (window._schedDays.length > 1) {
      window._schedDays.splice(idx, 1);
      btn.classList.remove('active');
    }
  } else {
    window._schedDays.push(day);
    btn.classList.add('active');
  }
  // Update subtitle live
  const sub = document.querySelector('#card-schedule .card-subtitle');
  if (sub) sub.textContent = window._schedDays.join(', ') + ' · ' + (clientData.posting_time||'11:00') + ' ' + (clientData.timezone||'Australia/Melbourne');
}

async function saveSchedule(btn) {
  if (busy) return;
  busy = true;
  const spinner = document.getElementById('sched-spinner');
  const msg = document.getElementById('sched-msg');
  spinner.classList.add('show');
  btn.disabled = true;

  const DAY_ORDER = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const rawDays = window._schedDays || (clientData?.posting_days||'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d=>d.trim());
  const days = DAY_ORDER.filter(d => rawDays.includes(d));
  const time = document.getElementById('sched-time').value || '11:00';
  const tz = document.getElementById('sched-tz').value || 'Australia/Melbourne';

  try {
    const resp = await fetch(PROXY_URL + '/client/' + clientData.client_id + '/schedule', {
      method: 'PATCH', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ posting_days: days.join(','), posting_time: time, timezone: tz })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      clientData.posting_days = days.join(',');
      clientData.posting_time = time;
      clientData.timezone = tz;
      window._schedDays = [...days]; // keep in sync
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
      // Update subtitle
      const sub = document.querySelector('#card-schedule .card-subtitle');
      if (sub) sub.textContent = `${days.join(', ')} · ${time} ${tz}`;
    }
  } catch(e) {}
  spinner.classList.remove('show');
  btn.disabled = false;
  busy = false;
}

function showDriveInput() {

async function testDrivePortal() {
  const url = document.getElementById('drive-url-input').value.trim();
  const status = document.getElementById('drive-test-status');
  if (!url || !url.includes('drive.google.com')) {
    status.innerHTML = '<span style="color:var(--red)">Please paste a valid Google Drive folder link</span>';
    return;
  }
  status.innerHTML = '<span style="color:var(--ink-light)">Checking...</span>';
  try {
    const resp = await fetch(VPS_URL + '/validate_drive', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({drive_url: url})
    });
    const result = await resp.json();
    if (result.valid) {
      const folders = result.structure || [];
      let html = '<span style="color:var(--green);font-weight:600">✅ Connected — ' + (result.folder_name||'folder found') + '</span>';
      if (folders.length > 0) {
        html += '<div style="margin-top:8px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px">';
        html += '<div style="font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Subfolders found (' + folders.length + ')</div>';
        html += folders.map(f => '<div style="font-size:12px;color:var(--ink);padding:3px 0;border-bottom:1px solid var(--border)">&#128193; ' + esc(typeof f === 'string' ? f : (f.name || JSON.stringify(f))) + '</div>').join('');
        html += '</div>';
      }
      status.innerHTML = html;
      // Save to posst-api including subfolder structure
      await fetch(PROXY_URL + '/client/' + clientData.client_id + '/drive', {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({google_drive_url: url, google_drive_intent: 'now', drive_categories: folders})
      });
      clientData.google_drive_url = url;
      clientData.drive_structure = folders;
      // Update connected box in place without re-rendering (avoids accordion collapse)
      const driveInputGroup = document.getElementById('drive-input-group');
      const connectedBox = document.querySelector('.drive-connected');
      if (driveInputGroup) driveInputGroup.style.display = 'none';
      if (connectedBox) {
        const folderList = folders.length > 0 ? `
          <div style="margin-top:8px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px">
            <div style="font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Subfolders (${folders.length})</div>
            ${folders.map(f => `<div style="font-size:12px;color:var(--ink);padding:3px 0;border-bottom:1px solid var(--border)">&#128193; ${typeof f === 'string' ? f : f.name || ''}</div>`).join('')}
          </div>` : '';
        connectedBox.innerHTML = `
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--green)">✅ Drive connected</div>
            <div class="drive-url">${url}</div>
            ${folderList}
          </div>
          <button class="btn btn-secondary btn-sm" onclick="changeDrive()">Change</button>`;
        connectedBox.style.display = 'flex';
      }
    } else {
      status.innerHTML = '<span style="color:var(--red)">&#10060; ' + (result.error||'Could not access folder. Make sure you shared it with posst-sheets-bot@posst-app.iam.gserviceaccount.com') + '</span>';
    }
  } catch(e) {
    status.innerHTML = '<span style="color:var(--red)">Connection error</span>';
  }
}

async function applyCoupon() {
  const input = document.getElementById('coupon-input');
  const status = document.getElementById('coupon-status');
  const btn = document.getElementById('coupon-btn');
  const code = (input?.value || '').trim();
  if (!code) { status.innerHTML = '<span style="color:#e53e3e">Please enter a discount code.</span>'; return; }
  btn.disabled = true; btn.textContent = 'Applying...';
  status.innerHTML = '';
  try {
    const resp = await fetch(PROXY_URL + '/stripe/coupon', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ client_id: clientData.client_id, coupon_code: code })
    });
    const result = await resp.json();
    if (result.discount) {
      status.innerHTML = '<span style="color:#38a169">✅ Discount applied — ' + result.discount + '</span>';
      input.value = '';
      btn.textContent = 'Applied ✅';
    } else {
      status.innerHTML = '<span style="color:#e53e3e">❌ ' + (result.error || 'Invalid or expired code.') + '</span>';
      btn.disabled = false; btn.textContent = 'Apply';
    }

    status.innerHTML = '<span style="color:#e53e3e">❌ Connection error. Please try again.</span>';

  }

async function addPlatform(platform) {

  try {

    alert('Could not generate connection link. Please try again.');

async function modalConfirm() {
  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  // Reconnect is handled client-side — no API call needed, just redirect to OAuth
  if (modalAction === 'reconnect') {
    closeModal();
    addPlatform('meta');
    return;
  }

  const endpoint = modalAction; // 'cancel' | 'pause' | 'resume' — all map directly to API routes
  try {
    const resp = await fetch(PROXY_URL + '/client/' + clientData.client_id + '/' + endpoint, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({})
    });
    const result = await resp.json();
    closeModal();
    if (result.status === 'success') {
      if (modalAction === 'resume') {
        // Resume drops the user straight back into their live dashboard, not a goodbye screen
        clientData.status = 'Active';
        renderDashboard();
        return;
      }
      document.getElementById('dashboard').innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:48px;margin-bottom:16px">${modalAction==='cancel'?'👋':'⏸️'}</div>
          <h2 style="font-family:var(--serif);font-size:24px;margin-bottom:10px">${modalAction==='cancel'?'Account cancelled':'Posting paused'}</h2>
          <p style="font-size:14px;color:var(--ink-mid);line-height:1.6;margin-bottom:24px">${modalAction==='cancel'?'Confirmation email sent. Your data is kept for 30 days.':'Confirmation email sent. Resume anytime from My Account.'}</p>
          <a href="https://posst.app" class="btn btn-secondary">Back to posst.app</a>
        </div>`;
    } else {
      alert('Something went wrong. Please try again.');
    }
  } catch(e) {
    closeModal();
    alert('Connection error. Please try again.');
  }
}

async function testDriveInPortal() {

  const status = document.getElementById('portal-drive-status');
  const btn = document.getElementById('portal-drive-btn');
  if (!url || !url.includes('drive.google.com')) {

  }
  if(btn) { btn.disabled=true; btn.textContent='Checking...'; }
  if(status) status.innerHTML = '<span style="color:var(--ink-light)">☕ Grab a coffee — this can take up to a minute...</span>';
  window.proSetup.driveValidated = false;
  try {
    const resp = await fetch(VPS_URL + '/validate_drive', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({drive_url: url})
    });
    const result = await resp.json();
    if (result.valid) {
      window.proSetup.driveValidated = true;
      window.proSetup.driveStructure = result.structure || [];
      const folders = result.structure || [];
      let folderHtml = '<span style="color:var(--green);font-weight:600">✅ Folder connected</span>';
      if (folders.length > 0) {
        folderHtml += '<div style="margin-top:8px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px">';
        folderHtml += '<div style="font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Subfolders found (' + folders.length + ')</div>';
        folderHtml += folders.map(f => '<div style="font-size:12px;color:var(--ink);padding:3px 0;border-bottom:1px solid var(--border)">📁 ' + esc(typeof f === 'string' ? f : (f.name || JSON.stringify(f))) + '</div>').join('');

      } else {
        folderHtml += '<div style="margin-top:6px;font-size:12px;color:var(--ink-mid)">No subfolders found &#8212; we will pick photos from the main folder automatically.</div>';

      if(status) status.innerHTML = folderHtml;
    } else {
      if(status) status.innerHTML = '<span style="color:var(--red)">❌ ' + (result.error||'Could not access folder') + '</span>';
    }
  } catch(e) {
    if(status) status.innerHTML = '<span style="color:var(--red)">❌ Connection error</span>';
  }
  if(btn) { btn.disabled=false; btn.textContent='🔗 Test'; }
}

async function saveProSetup() {
  const btn = document.getElementById('pro-save-btn');
  if(btn) { btn.disabled=true; btn.textContent='Saving...'; }
  try {
    const driveCategories = (window.proSetup.driveStructure||[]).map(cat => ({

    }));

      body: JSON.stringify({ day_themes: window.proSetup.dayThemes })

      await fetch(PROXY_URL + '/client/' + clientData.client_id + '/drive', {

    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <h2 style="font-family:var(--serif);font-size:24px;margin-bottom:10px">You are all set on Pro!</h2>
      <p style="font-size:14px;color:var(--ink-mid);margin-bottom:24px;line-height:1.6">${driveIntent==='now'?'Your photo library is connected. Real photos will be used in your next posts.':'Your Pro features are active. You can connect your photo library anytime from your account.'}</p>
      <button class="btn btn-primary" onclick="renderDashboard()">Go to my account →</button>
    </div>`;
}

// ── STYLE GALLERY (Phase 4, v43) ─────────────────────────

let _galleryData = null;
let _selectedStyleIds = new Set();

// Reset when dashboard re-renders (account switch)
const _origRenderDashboard = renderDashboard;
renderDashboard = function() {
  _galleryData = null;
  _selectedStyleIds = new Set();
  _origRenderDashboard();
};

async function loadStyleGallery() {
  const grid = document.getElementById('style-grid');
  if (!grid || !clientData) return;
  try {
    const resp = await fetch(PROXY_URL + '/client/' + clientData.client_id + '/style-gallery', {
      method: 'GET', headers: {'Content-Type': 'application/json'}
    });
    const result = await resp.json();
    if (result.status !== 'success' || !result.data) {
      grid.innerHTML = '<div style="grid-column:1/-1;font-size:13px;color:var(--ink-light);text-align:center;padding:20px">Could not load styles. Try refreshing.</div>';
      return;
    }
    _galleryData = result.data;
    _selectedStyleIds = new Set(result.data.gallery.filter(s => s.is_selected).map(s => s.id));
    renderStyleGrid();
  } catch(e) {
    grid.innerHTML = '<div style="grid-column:1/-1;font-size:13px;color:var(--red);text-align:center;padding:20px">Connection error</div>';
  }
}

function renderStyleGrid() {
  const grid = document.getElementById('style-grid');
  if (!grid || !_galleryData) return;
  const plan = (_galleryData.plan || 'standard').toLowerCase();
  grid.innerHTML = _galleryData.gallery.map(s => {
    const selected = _selectedStyleIds.has(s.id);
    const locked = s.is_locked;
    const cls = `style-card${selected?' selected':''}${locked?' locked':''}`;
    const imgHtml = s.preview_url
      ? `<img class="style-img" src="${esc(s.preview_url)}" alt="${esc(s.name)}" loading="lazy" onerror="this.outerHTML='<div class=\\'style-img-placeholder\\'>🎨</div>'">`
      : '<div class="style-img-placeholder">🎨</div>';
    return `
      <div class="${cls}" onclick="${locked?'':'toggleStyle(\''+s.id+'\',this)'}" title="${esc(s.description||s.name)}">
        ${imgHtml}
        <div class="style-name">${esc(s.name)}</div>
        ${locked ? '<div class="style-lock">🔒</div>' : ''}
        <div class="style-check">✓</div>
      </div>`;
  }).join('');
  document.getElementById('styles-save-row').style.display = 'flex';
}

function toggleStyle(styleId, el) {
  if (!_galleryData) return;
  const style = _galleryData.gallery.find(s => s.id === styleId);
  if (!style || style.is_locked) return;
  // Photorealistic (is_default) can't be deselected
  if (style.is_default && _selectedStyleIds.has(styleId)) return;
  const plan = (_galleryData.plan || 'standard').toLowerCase();
  if (_selectedStyleIds.has(styleId)) {
    _selectedStyleIds.delete(styleId);
  } else {
    // Standard: max 3 total (photorealistic + 2)
    if (plan !== 'pro' && _selectedStyleIds.size >= 3) {
      const msg = document.getElementById('styles-msg');
      msg.textContent = 'Standard plan allows Photorealistic + 2 styles';
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = ''; }, 3000);
      return;
    }
    _selectedStyleIds.add(styleId);
  }
  renderStyleGrid();
}

async function saveStyles(btn) {
  if (busy || !_galleryData) return;
  const ids = Array.from(_selectedStyleIds);
  if (ids.length < 1) return;
  busy = true;
  const spinner = document.getElementById('styles-spinner');
  const msg = document.getElementById('styles-msg');
  spinner.style.display = 'inline-block';
  msg.style.display = 'none';
  try {
    const resp = await fetch(PROXY_URL + '/client/' + clientData.client_id + '/artistic-styles', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ style_ids: ids })
    });
    const result = await resp.json();
    if (result.status === 'ok') {
      msg.textContent = '✅ Styles updated!';
      msg.style.color = 'var(--green)';
      // Mark step 1 done in welcome card
      let notes = typeof clientData.notes === 'string' ? (() => { try { return JSON.parse(clientData.notes); } catch(e) { return {}; } })() : (clientData.notes || {});
      notes.styles_customized = true;
      clientData.notes = notes;
    } else {
      msg.textContent = result.message || 'Error saving';
      msg.style.color = 'var(--red)';
    }
  } catch(e) {
    msg.textContent = 'Connection error';
    msg.style.color = 'var(--red)';
  }
  spinner.style.display = 'none';
  msg.style.display = 'inline';
  busy = false;
}

// Load gallery when styles card is first opened
const _origToggle = toggleCard;
toggleCard = function(id) {
  _origToggle(id);
  if (id === 'styles' && !_galleryData) {
    loadStyleGallery();
  }
};

// ── LOGO UPLOAD (Phase 4, v43) ───────────────────────────

function triggerLogoUpload() {
  document.getElementById('logo-file-input').click();
}

async function handleLogoFile(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('logo-status');

  // Client-side checks (server validates again)
  if (!['image/png', 'image/jpeg'].includes(file.type)) {
    status.innerHTML = '<span style="color:var(--red)">Only PNG or JPG files accepted</span>';
    return;
  }
  if (file.size > 500 * 1024) {
    status.innerHTML = '<span style="color:var(--red)">Logo must be under 500KB</span>';
    return;
  }

  status.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0 auto"></div>';

  try {
    // Read as base64
    const b64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Read failed'));
      reader.readAsDataURL(file);
    });

    const resp = await fetch(PROXY_URL + '/client/' + clientData.client_id + '/logo', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ image_b64: b64 })
    });
    const result = await resp.json();

    if (result.status === 'success' && result.logo_url) {
      clientData.logo_url = result.logo_url;
      status.innerHTML = '<span style="color:var(--green)">✅ Logo uploaded!</span>';
      // Update the upload area to show preview
      const area = document.getElementById('logo-area');
      area.classList.add('has-logo');
      area.innerHTML = `
        <img src="${esc(result.logo_url)}" class="logo-preview" id="logo-preview" alt="Your logo">
        <button class="logo-replace-btn" onclick="event.stopPropagation();triggerLogoUpload()">Replace logo</button>`;
    } else {
      status.innerHTML = `<span style="color:var(--red)">${result.message || 'Upload failed'}</span>`;
    }
  } catch(e) {
    status.innerHTML = '<span style="color:var(--red)">Connection error. Please try again.</span>';
  }
  // Reset input so same file can be re-selected
  input.value = '';
}

// ── WELCOME CARD (Phase 4, v43) ──────────────────────────

// ── BRANDING CONTACT INFO (Phase 4, v43) ─────────────────

function updateBrandingPreview() {
  const email = (document.getElementById('branding-email')?.value || '').trim();
  const phone = (document.getElementById('branding-phone')?.value || '').trim();
  const preview = document.getElementById('branding-preview');
  if (preview) {
    const parts = [email, phone].filter(Boolean);
    preview.textContent = parts.length ? parts.join(' | ') : 'No contact info set';
  }
}

// Live preview as user types
document.addEventListener('input', function(e) {
  if (e.target.id === 'branding-email' || e.target.id === 'branding-phone') {
    updateBrandingPreview();
  }
});

async function saveBranding(btn) {
  if (busy) return;
  busy = true;
  const spinner = document.getElementById('branding-spinner');
  const msg = document.getElementById('branding-msg');
  spinner.style.display = 'inline-block';
  msg.style.display = 'none';
  const email = (document.getElementById('branding-email')?.value || '').trim();
  const phone = (document.getElementById('branding-phone')?.value || '').trim();
  try {
    const resp = await fetch(PROXY_URL + '/client/' + clientData.client_id + '/branding', {
      method: 'PATCH', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ caption_email: email, caption_phone: phone })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      clientData.caption_email = email;
      clientData.caption_phone = phone;
      msg.textContent = '✅ Contact info updated!';
      msg.style.color = 'var(--green)';
    } else {
      msg.textContent = result.message || 'Error saving';
      msg.style.color = 'var(--red)';
    }
  } catch(e) {
    msg.textContent = 'Connection error';
    msg.style.color = 'var(--red)';
  }
  spinner.style.display = 'none';
  msg.style.display = 'inline';
  busy = false;
}

async function dismissWelcome() {
  const card = document.getElementById('welcome-card');
  if (card) card.style.display = 'none';
  try {
    await fetch(PROXY_URL + '/client/' + clientData.client_id + '/portal-onboarded', {
      method: 'PATCH', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({})
    });
    // Update local data so it doesn't reappear on re-render
    let notes = typeof clientData.notes === 'string' ? (() => { try { return JSON.parse(clientData.notes); } catch(e) { return {}; } })() : (clientData.notes || {});
    notes.portal_onboarded = true;
    clientData.notes = notes;
  } catch(e) { /* silent — card already hidden */ }
}
