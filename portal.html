<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — posst.app</title>
<link rel="icon" href="https://posst.app/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="https://posst.app/favicon-32x32.png">
<link rel="apple-touch-icon" href="https://posst.app/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1648FF;--blue-dim:#E8EEFF;--blue-dark:#0f35d4;
  --cream:#FFFAF4;--ink:#0F0E17;--ink-mid:#4A4860;--ink-light:#9896A8;
  --border:#E4DFD6;--white:#FFFFFF;--green:#16A34A;--green-dim:#F0FDF4;
  --red:#DC2626;--red-dim:#FEF2F2;--amber:#D97706;--amber-dim:#FFFBEB;
  --sans:'DM Sans',system-ui,sans-serif;--serif:'DM Serif Display',Georgia,serif;
}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(255,250,244,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo img{height:28px;display:block}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-name{font-size:13px;font-weight:600;color:var(--ink-mid)}
.nav-signout{font-size:12px;color:var(--ink-light);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--sans)}

/* ── LAYOUT ── */
.page{padding:80px 16px 40px;max-width:600px;margin:0 auto}

/* ── LOADING ── */
.loading{text-align:center;padding:80px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--ink-mid)}

/* ── ACCOUNT HEADER ── */
.acct-header{background:var(--blue);border-radius:16px;padding:24px;margin-bottom:20px;color:white}
.acct-biz{font-family:var(--serif);font-size:22px;margin-bottom:6px}
.acct-meta{font-size:12px;opacity:0.75;display:flex;align-items:center;gap:8px}
.acct-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.acct-badge.pro{background:rgba(255,255,255,0.25)}

/* ── SECTION CARD ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none}
.card-header-left{display:flex;align-items:center;gap:10px}
.card-icon{font-size:18px;width:32px;text-align:center}
.card-title{font-size:14px;font-weight:700;color:var(--ink)}
.card-subtitle{font-size:12px;color:var(--ink-light);margin-top:2px}
.card-chevron{font-size:12px;color:var(--ink-light);transition:transform 0.2s}
.card-chevron.open{transform:rotate(180deg)}
.card-body{padding:0 20px 20px;display:none}
.card-body.open{display:block}
.card-divider{height:1px;background:var(--border);margin:0 20px}

/* ── STATUS PILLS ── */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.pill-green{background:var(--green-dim);color:var(--green)}
.pill-blue{background:var(--blue-dim);color:var(--blue)}
.pill-amber{background:var(--amber-dim);color:var(--amber)}
.pill-red{background:var(--red-dim);color:var(--red)}

/* ── PLATFORM ROWS ── */
.platform-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.platform-row:last-child{border-bottom:none}
.platform-info{display:flex;align-items:center;gap:10px}
.platform-icon{font-size:18px}
.platform-name{font-size:13px;font-weight:600;color:var(--ink)}
.platform-status{font-size:11px;color:var(--ink-light);margin-top:1px}

/* ── SCHEDULE GRID ── */
.days-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.day-toggle{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:700;color:var(--ink-light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:var(--sans)}
.day-toggle.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}
.time-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}

/* ── THEME ROWS ── */
.theme-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.theme-row:last-child{border-bottom:none}
.theme-day{font-size:13px;font-weight:700;color:var(--ink);width:40px;flex-shrink:0}

/* ── FORM ELEMENTS ── */
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--sans);color:var(--ink);background:white;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--blue)}
.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);color:var(--ink);background:white;outline:none;cursor:pointer}
.form-label{font-size:12px;font-weight:600;color:var(--ink-mid);margin-bottom:6px;display:block}
.form-hint{font-size:11px;color:var(--ink-light);margin-top:4px}
.form-group{margin-bottom:14px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;border:none;transition:all 0.15s;text-decoration:none}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:white;color:var(--ink);border:1.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1.5px solid #FECACA}
.btn-success{background:var(--green-dim);color:var(--green);border:1.5px solid #BBF7D0}
.btn-full{width:100%;justify-content:center;padding:12px}
.btn-sm{padding:7px 14px;font-size:12px}
.btn:disabled{opacity:0.6;cursor:not-allowed}

/* ── INFO BOXES ── */
.info-box{border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.6;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.info-box-green{background:var(--green-dim);border:1px solid #BBF7D0;color:#166534}
.info-box-amber{background:var(--amber-dim);border:1px solid #FDE68A;color:#92400e}
.info-box-blue{background:var(--blue-dim);border:1px solid #BFDBFE;color:#1e40af}
.info-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* ── SAVE ROW ── */
.save-row{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.save-msg{font-size:12px;color:var(--green);font-weight:600;display:none}
.save-msg.show{display:block}

/* ── DANGER ZONE ── */
.danger-zone{background:var(--red-dim);border:1px solid #FECACA;border-radius:14px;padding:20px;margin-top:8px}
.danger-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px}
.danger-desc{font-size:12px;color:#991b1b;line-height:1.6;margin-bottom:14px}
.danger-actions{display:flex;gap:10px;flex-wrap:wrap}

/* ── SPINNER IN BTN ── */
.btn-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn-spinner.show{display:block}

/* ── DRIVE STATUS ── */
.drive-connected{background:var(--green-dim);border:1px solid #BBF7D0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.drive-url{font-size:11px;color:var(--ink-light);margin-top:3px;word-break:break-all}

/* ── FOOTER ── */
.footer{text-align:center;padding:32px 16px;font-size:11px;color:var(--ink-light)}
.footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>

<nav class="nav">
  <a href="https://posst.app" class="nav-logo">
    <img src="https://posst.app/posst_logo_dark.png" alt="posst.app">
  </a>
  <div class="nav-right">
    <span class="nav-name" id="nav-biz-name"></span>
    <button class="nav-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="page" id="page">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading your account...</div>
  </div>
  <div id="dashboard" style="display:none"></div>
</div>

<div class="footer">
  <a href="https://posst.app">posst.app</a> &nbsp;·&nbsp;
  <a href="mailto:chief@posst.app">chief@posst.app</a>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGmzB2ym3jcb2f7MqWUBtMgIU1veoF_NLoDhRYhFWBrilZIaURPHkuP8g68UTjBxJ95g/exec";
const VPS_URL = "https://connect.posst.app";

const DAY_THEMES = ['Service Spotlight','Tip / Advice','Transformation Story','Seasonal / Local','Booking Nudge','Fun Fact','Community Love'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ALL_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let clientData = null;
let phone = '';
let busy = false;

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  // Get phone from URL or sessionStorage
  const params = new URLSearchParams(window.location.search);
  phone = params.get('phone') || sessionStorage.getItem('posst_portal_phone') || '';

  if (!phone) {
    // No phone — redirect to login
    window.location.href = 'https://onboarding.posst.app?mode=login';
    return;
  }
  sessionStorage.setItem('posst_portal_phone', phone);

  await loadAccount();
});

async function loadAccount() {
  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'portal_lookup', phone })
    });
    const result = await resp.json();

    if (result.status !== 'success') {
      showError('Account not found. Please sign in again.');
      return;
    }

    clientData = result.data;
    document.getElementById('nav-biz-name').textContent = clientData.business_name || '';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  } catch(e) {
    showError('Connection error. Please try again.');
  }
}

function showError(msg) {
  document.getElementById('loading').innerHTML = `<p style="color:var(--red);font-size:14px">${msg}</p><br><a href="https://onboarding.posst.app?mode=login" class="btn btn-primary btn-sm">Sign in again</a>`;
}

function signOut() {
  sessionStorage.removeItem('posst_portal_phone');
  window.location.href = 'https://posst.app';
}

// ── RENDER DASHBOARD ──────────────────────────────────────
function renderDashboard() {
  const cd = clientData;
  const isPro = (cd.plan || '').toLowerCase() === 'pro';
  const isActive = cd.status === 'Active';

  // Parse posting days
  const postingDays = (cd.posting_days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d => d.trim());

  // Parse platforms
  const platforms = (cd.platforms || '').toLowerCase().split(',').map(p => p.trim()).filter(Boolean);
  const hasFB = platforms.some(p => p.includes('facebook'));
  const hasIG = platforms.some(p => p.includes('instagram'));
  const hasGBP = platforms.some(p => p.includes('gbp') || p.includes('google'));

  // Parse day themes from notes
  let dayThemes = {};
  try { const n = JSON.parse(cd.notes || '{}'); dayThemes = n.day_themes || {}; } catch(e) {}
  const defaultThemes = {Mon:'Service Spotlight',Tue:'Tip / Advice',Wed:'Transformation Story',Thu:'Seasonal / Local',Fri:'Booking Nudge',Sat:'Fun Fact',Sun:'Community Love'};
  DAYS.forEach(d => { if (!dayThemes[d]) dayThemes[d] = defaultThemes[d]; });

  const html = `
    <!-- Account Header -->
    <div class="acct-header">
      <div class="acct-biz">${esc(cd.business_name || 'Your Business')}</div>
      <div class="acct-meta">
        <span class="acct-badge ${isPro?'pro':''}">${isPro?'PRO':'STANDARD'}</span>
        <span>📍 ${esc(cd.business_city || '')}</span>
        ${isActive ? '<span>✅ Active</span>' : '<span>⏳ Setting up</span>'}
      </div>
    </div>

    <!-- Plan & Billing -->
    <div class="card" id="card-plan">
      <div class="card-header" onclick="toggleCard('plan')">
        <div class="card-header-left">
          <div class="card-icon">💳</div>
          <div>
            <div class="card-title">Plan & Billing</div>
            <div class="card-subtitle">${isPro ? 'Pro plan' : 'Standard plan'} · 30-day free trial</div>
          </div>
        </div>
        <div class="card-chevron" id="chevron-plan">▼</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body" id="body-plan">
        <div style="padding-top:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div>
              <div style="font-size:16px;font-weight:700;color:var(--ink)">${isPro ? 'Pro' : 'Standard'}</div>
              <div style="font-size:12px;color:var(--ink-light);margin-top:2px">${isPro ? 'A$34.99/month' : 'A$24.99/month'} · no setup fee</div>
            </div>
            <span class="pill ${isPro?'pill-blue':'pill-green'}">${isPro?'✦ Pro':'Standard'}</span>
          </div>
          ${!isPro ? `
          <div class="info-box info-box-blue">
            <span class="info-icon">⚡</span>
            <div><strong>Upgrade to Pro</strong> — use your own photos via Google Drive and set custom content themes per day. Real photos get 3-5x more engagement.</div>
          </div>
          <button class="btn btn-primary btn-full" onclick="startUpgrade()">Upgrade to Pro ✦</button>
          ` : ''}
          <div style="margin-top:${isPro?'0':'12px'}">
            <div class="info-box info-box-amber" style="margin-bottom:0">
              <span class="info-icon">💳</span>
              <div>Billing managed by Stripe. Card details and invoices available once billing is active. <a href="mailto:chief@posst.app" style="color:var(--amber)">Contact us</a> for billing queries.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Posting Schedule -->
    <div class="card" id="card-schedule">
      <div class="card-header" onclick="toggleCard('schedule')">
        <div class="card-header-left">
          <div class="card-icon">📅</div>
          <div>
            <div class="card-title">Posting Schedule</div>
            <div class="card-subtitle">${postingDays.join(', ')} · ${esc(cd.posting_time || '11:00')} ${esc(cd.timezone || 'Australia/Melbourne')}</div>
          </div>
        </div>
        <div class="card-chevron" id="chevron-schedule">▼</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body" id="body-schedule">
        <div style="padding-top:16px">
          <div class="form-label">Posting days</div>
          <div class="days-grid" id="sched-days">
            ${ALL_DAYS.map(d => `<button class="day-toggle ${postingDays.includes(d)?'active':''}" onclick="toggleSchedDay('${d}',this)">${d}</button>`).join('')}
          </div>
          <div class="form-group">
            <label class="form-label">Posting time</label>
            <div class="time-row">
              <input type="time" id="sched-time" class="form-input" style="max-width:160px" value="${cd.posting_time||'11:00'}">
              <span style="font-size:12px;color:var(--ink-light)">in your local timezone</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Timezone</label>
            <select id="sched-tz" class="form-select">
              ${['Australia/Melbourne','Australia/Sydney','Australia/Brisbane','Australia/Perth','Australia/Adelaide','Australia/Darwin','Australia/Hobart','Pacific/Auckland','Asia/Singapore','Asia/Kolkata','America/New_York','America/Los_Angeles','Europe/London'].map(tz => `<option value="${tz}" ${(cd.timezone||'Australia/Melbourne')===tz?'selected':''}>${tz}</option>`).join('')}
            </select>
          </div>
          <div class="save-row">
            <button class="btn btn-primary btn-sm" onclick="saveSchedule(this)">
              <span class="btn-spinner" id="sched-spinner"></span>
              Save changes
            </button>
            <span class="save-msg" id="sched-msg">✅ Schedule updated!</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Platforms -->
    <div class="card" id="card-platforms">
      <div class="card-header" onclick="toggleCard('platforms')">
        <div class="card-header-left">
          <div class="card-icon">📱</div>
          <div>
            <div class="card-title">Platforms</div>
            <div class="card-subtitle">${[hasFB?'Facebook':'',hasIG?'Instagram':'',hasGBP?'GBP':''].filter(Boolean).join(', ') || 'None connected'}</div>
          </div>
        </div>
        <div class="card-chevron" id="chevron-platforms">▼</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body" id="body-platforms">
        <div style="padding-top:4px">
          ${hasFB ? `<div class="platform-row"><div class="platform-info"><span class="platform-icon">📘</span><div><div class="platform-name">Facebook</div><div class="platform-status">${esc(cd.fb_page_name||'Connected')}</div></div></div><span class="pill pill-green">✓ Connected</span></div>` : ''}
          ${hasIG ? `<div class="platform-row"><div class="platform-info"><span class="platform-icon">📸</span><div><div class="platform-name">Instagram</div><div class="platform-status">${esc(cd.ig_handle||'Connected')}</div></div></div><span class="pill pill-green">✓ Connected</span></div>` : ''}
          ${hasGBP ? `<div class="platform-row"><div class="platform-info"><span class="platform-icon">🗺️</span><div><div class="platform-name">Google Business</div><div class="platform-status">${cd.gbp_connected?'Connected':'Pending API access'}</div></div></div><span class="pill ${cd.gbp_connected?'pill-green':'pill-amber'}">${cd.gbp_connected?'✓ Connected':'⏳ Pending'}</span></div>` : ''}
          ${!hasFB && !hasIG && !hasGBP ? '<p style="font-size:13px;color:var(--ink-light);padding:12px 0">No platforms connected yet.</p>' : ''}
          <div style="margin-top:14px">
            ${!hasFB ? `<button class="btn btn-secondary btn-sm" style="margin-right:8px;margin-bottom:8px" onclick="addPlatform('meta')">+ Add Facebook</button>` : ''}
            ${!hasGBP ? `<button class="btn btn-secondary btn-sm" style="margin-bottom:8px" onclick="addPlatform('google')">+ Add Google Business</button>` : ''}
          </div>
        </div>
      </div>
    </div>

    ${isPro ? `
    <!-- Photo Library (Pro) -->
    <div class="card" id="card-drive">
      <div class="card-header" onclick="toggleCard('drive')">
        <div class="card-header-left">
          <div class="card-icon">📷</div>
          <div>
            <div class="card-title">Photo Library</div>
            <div class="card-subtitle">${cd.google_drive_url ? 'Google Drive connected' : 'Not connected'}</div>
          </div>
        </div>
        <div class="card-chevron" id="chevron-drive">▼</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body" id="body-drive">
        <div style="padding-top:16px">
          ${cd.google_drive_url ? `
          <div class="drive-connected">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--green)">✅ Drive connected</div>
              <div class="drive-url">${esc(cd.google_drive_url)}</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="changeDrive()">Change</button>
          </div>` : `
          <div class="info-box info-box-amber">
            <span class="info-icon">📷</span>
            <div>Connect your Google Drive photo folder so we use your real photos in every post. Share the folder with <strong>posst-sheets-bot@posst-app.iam.gserviceaccount.com</strong> as Viewer first.</div>
          </div>`}
          <div class="form-group" id="drive-input-group" style="${cd.google_drive_url?'display:none':''}">
            <label class="form-label">Google Drive folder URL</label>
            <div style="display:flex;gap:8px">
              <input id="drive-url-input" class="form-input" style="flex:1" placeholder="https://drive.google.com/drive/folders/...">
              <button class="btn btn-secondary btn-sm" onclick="testDrivePortal()">Test</button>
            </div>
            <div id="drive-test-status" style="font-size:12px;margin-top:6px"></div>
          </div>
          ${cd.google_drive_url ? `<button class="btn btn-secondary btn-sm" onclick="showDriveInput()">Connect different folder</button>` : ''}
        </div>
      </div>
    </div>

    <!-- Content Themes (Pro) -->
    <div class="card" id="card-themes">
      <div class="card-header" onclick="toggleCard('themes')">
        <div class="card-header-left">
          <div class="card-icon">🎨</div>
          <div>
            <div class="card-title">Content Themes</div>
            <div class="card-subtitle">Custom theme per day of the week</div>
          </div>
        </div>
        <div class="card-chevron" id="chevron-themes">▼</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body" id="body-themes">
        <div style="padding-top:4px">
          ${DAYS.map(d => `
          <div class="theme-row">
            <div class="theme-day">${d}</div>
            <select class="form-select" id="theme-${d}" style="flex:1">
              ${DAY_THEMES.map(t => `<option value="${t}" ${dayThemes[d]===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>`).join('')}
          <div class="save-row">
            <button class="btn btn-primary btn-sm" onclick="saveThemes(this)">
              <span class="btn-spinner" id="themes-spinner"></span>
              Save themes
            </button>
            <span class="save-msg" id="themes-msg">✅ Themes updated!</span>
          </div>
        </div>
      </div>
    </div>
    ` : ''}

    <!-- Danger Zone -->
    <div class="danger-zone">
      <div class="danger-title">⚠️ Account Actions</div>
      <div class="danger-desc">Need to pause or cancel? Your account will be updated immediately and you'll receive a confirmation email.</div>
      <div class="danger-actions">
        <button class="btn btn-secondary btn-sm" onclick="showPauseConfirm()">Pause posting</button>
        <button class="btn btn-danger btn-sm" onclick="showCancelConfirm()">Cancel account</button>
      </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px">
      <div style="background:white;border-radius:16px;padding:28px;max-width:400px;width:100%;text-align:center">
        <div id="modal-icon" style="font-size:40px;margin-bottom:12px"></div>
        <h3 id="modal-title" style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px"></h3>
        <p id="modal-desc" style="font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:20px"></p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-secondary" onclick="closeModal()">Go back</button>
          <button id="modal-confirm-btn" class="btn" onclick="modalConfirm()">Confirm</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('dashboard').innerHTML = html;
}

// ── HELPERS ───────────────────────────────────────────────
function esc(s) { return !s ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chevron-'+id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

// ── SCHEDULE ──────────────────────────────────────────────
let schedDays = (clientData?.posting_days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d=>d.trim());

function toggleSchedDay(day, btn) {
  // Re-init schedDays from current buttons
  if (!window._schedDays) {
    window._schedDays = (clientData?.posting_days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d=>d.trim());
  }
  const idx = window._schedDays.indexOf(day);
  if (idx > -1) {
    if (window._schedDays.length > 1) { // keep at least 1 day
      window._schedDays.splice(idx,1);
      btn.classList.remove('active');
    }
  } else {
    window._schedDays.push(day);
    btn.classList.add('active');
  }
}

async function saveSchedule(btn) {
  if (busy) return;
  busy = true;
  const spinner = document.getElementById('sched-spinner');
  const msg = document.getElementById('sched-msg');
  spinner.classList.add('show');
  btn.disabled = true;

  const days = window._schedDays || (clientData?.posting_days||'Mon,Tue,Wed,Thu,Fri,Sat,Sun').split(',').map(d=>d.trim());
  const time = document.getElementById('sched-time').value || '11:00';
  const tz = document.getElementById('sched-tz').value || 'Australia/Melbourne';

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'update_schedule',
        client_id: clientData.client_id,
        posting_days: days.join(','),
        posting_time: time,
        timezone: tz
      })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      clientData.posting_days = days.join(',');
      clientData.posting_time = time;
      clientData.timezone = tz;
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
      // Update subtitle
      const sub = document.querySelector('#card-schedule .card-subtitle');
      if (sub) sub.textContent = `${days.join(', ')} · ${time} ${tz}`;
    }
  } catch(e) {}
  spinner.classList.remove('show');
  btn.disabled = false;
  busy = false;
}

// ── THEMES ────────────────────────────────────────────────
async function saveThemes(btn) {
  if (busy) return;
  busy = true;
  const spinner = document.getElementById('themes-spinner');
  const msg = document.getElementById('themes-msg');
  spinner.classList.add('show');
  btn.disabled = true;

  const themes = {};
  DAYS.forEach(d => {
    const sel = document.getElementById('theme-'+d);
    if (sel) themes[d] = sel.value;
  });

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'save_pro_setup',
        client_id: clientData.client_id,
        day_themes: themes
      })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }
  } catch(e) {}
  spinner.classList.remove('show');
  btn.disabled = false;
  busy = false;
}

// ── DRIVE ─────────────────────────────────────────────────
function showDriveInput() {
  const g = document.getElementById('drive-input-group');
  if (g) g.style.display = 'block';
}

async function testDrivePortal() {
  const url = document.getElementById('drive-url-input').value.trim();
  const status = document.getElementById('drive-test-status');
  if (!url || !url.includes('drive.google.com')) {
    status.innerHTML = '<span style="color:var(--red)">Please paste a valid Google Drive folder link</span>';
    return;
  }
  status.innerHTML = '<span style="color:var(--ink-light)">Checking...</span>';
  try {
    const resp = await fetch(VPS_URL + '/validate_drive', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({drive_url: url})
    });
    const result = await resp.json();
    if (result.valid) {
      status.innerHTML = '<span style="color:var(--green);font-weight:600">✅ Connected — ' + (result.folder_name||'folder found') + '</span>';
      // Save to sheet
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'update_drive_setup',
          client_id: clientData.client_id,
          google_drive_url: url,
          drive_categories: '[]',
          google_drive_intent: 'now'
        })
      });
      clientData.google_drive_url = url;
      renderDashboard();
    } else {
      status.innerHTML = '<span style="color:var(--red)">❌ ' + (result.error||'Could not access folder') + '</span>';
    }
  } catch(e) {
    status.innerHTML = '<span style="color:var(--red)">Connection error</span>';
  }
}

function changeDrive() { showDriveInput(); }

// ── UPGRADE ───────────────────────────────────────────────
function startUpgrade() {
  // Show upgrade confirmation
  const dashboard = document.getElementById('dashboard');
  const upgradeHtml = `
    <div style="text-align:center;padding:20px 0 10px">
      <div style="font-size:32px;margin-bottom:12px">✦</div>
      <h2 style="font-family:var(--serif);font-size:24px;margin-bottom:8px">Upgrade to Pro</h2>
      <p style="font-size:14px;color:var(--ink-mid);margin-bottom:24px;line-height:1.6">Get your own photos in every post and custom content themes per day.<br><strong>A$34.99/month</strong> · no setup fee · cancel anytime</p>
      <button class="btn btn-primary btn-full" id="upgrade-confirm-btn" onclick="confirmUpgrade(this)" style="margin-bottom:10px">Confirm upgrade to Pro ✦</button>
      <button class="btn btn-secondary btn-full" onclick="renderDashboard()">Cancel</button>
    </div>`;
  dashboard.innerHTML = upgradeHtml;
}

async function confirmUpgrade(btn) {
  if (busy) return;
  busy = true;
  btn.disabled = true;
  btn.textContent = 'Upgrading...';
  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'handle_upgrade', client_id: clientData.client_id })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      clientData.plan = 'Pro';
      renderProSetup();
    } else {
      btn.disabled = false;
      btn.textContent = 'Confirm upgrade to Pro ✦';
      alert('Upgrade failed. Please try again.');
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Confirm upgrade to Pro ✦';
  }
  busy = false;
}

// ── ADD PLATFORM ──────────────────────────────────────────
async function addPlatform(platform) {
  if (busy) return;
  busy = true;
  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'generate_oauth_token', client_id: clientData.client_id })
    });
    const result = await resp.json();
    if (!result.token) throw new Error('No token');
    const platformsParam = platform === 'google' ? 'gbp' : 'facebook,instagram';
    const connectUrl = VPS_URL + '/connect?client_id=' + encodeURIComponent(clientData.client_id)
      + '&token=' + encodeURIComponent(result.token)
      + '&platforms=' + encodeURIComponent(platformsParam)
      + '&business=' + encodeURIComponent(clientData.business_name || '')
      + '&email=' + encodeURIComponent(clientData.email || '');
    window.location.href = connectUrl;
  } catch(e) {
    busy = false;
    alert('Could not generate connection link. Please try again.');
  }
}

// ── MODAL ─────────────────────────────────────────────────
let modalAction = null;

function showModal(icon, title, desc, btnText, btnClass, action) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  const btn = document.getElementById('modal-confirm-btn');
  btn.textContent = btnText;
  btn.className = 'btn ' + btnClass;
  modalAction = action;
  const modal = document.getElementById('confirm-modal');
  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('confirm-modal').style.display = 'none';
  modalAction = null;
}

function showPauseConfirm() {
  showModal('⏸️', 'Pause your posting?',
    'Your automated posts will stop immediately. You can resume anytime by contacting us.',
    'Pause posting', 'btn-secondary', 'pause');
}

function showCancelConfirm() {
  showModal('⚠️', 'Cancel your account?',
    'Your posting stops immediately. Your data is kept for 30 days — reply to the cancellation email to reactivate.',
    'Yes, cancel account', 'btn-danger', 'cancel');
}

async function modalConfirm() {
  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  const action = modalAction === 'cancel' ? 'cancel_account' : 'pause_account';
  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action, client_id: clientData.client_id })
    });
    const result = await resp.json();
    closeModal();
    if (result.status === 'success') {
      document.getElementById('dashboard').innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:48px;margin-bottom:16px">${modalAction==='cancel'?'👋':'⏸️'}</div>
          <h2 style="font-family:var(--serif);font-size:24px;margin-bottom:10px">${modalAction==='cancel'?'Account cancelled':'Posting paused'}</h2>
          <p style="font-size:14px;color:var(--ink-mid);line-height:1.6;margin-bottom:24px">${modalAction==='cancel'?'Confirmation email sent. Your data is kept for 30 days.':'Confirmation email sent. Reply to resume anytime.'}</p>
          <a href="https://posst.app" class="btn btn-secondary">Back to posst.app</a>
        </div>`;
    } else {
      alert('Something went wrong. Please try again.');
    }
  } catch(e) {
    closeModal();
    alert('Connection error. Please try again.');
  }
}

// ── PRO SETUP (after upgrade) ────────────────────────────
function renderProSetup() {
  const defaultThemes = {Mon:'Service Spotlight',Tue:'Tip / Advice',Wed:'Transformation Story',Thu:'Seasonal / Local',Fri:'Booking Nudge',Sat:'Fun Fact',Sun:'Community Love'};
  let proSetup = { dayThemes: {...defaultThemes}, driveUrl: '', driveValidated: false, driveStructure: [], driveAssignments: {} };

  const themeRows = `<div class="days-theme-grid">` +
    DAYS.map(d => {
      return `<div class="day-theme-card active">
        <div class="day-theme-name">${d}</div>
        <select class="day-theme-select" onchange="proSetup.dayThemes['${d}']=this.value">
          ${DAY_THEMES.map(t => `<option value="${t}" ${(proSetup.dayThemes[d]||'')===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>`;
    }).join('') + `</div>`;

  window.proSetup = proSetup;

  document.getElementById('dashboard').innerHTML = `
    <div class="step-tag" style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:8px">Upgraded!</div>
    <h1 style="font-family:var(--serif);font-size:28px;margin-bottom:6px">Welcome to Pro 🎉</h1>
    <p style="font-size:14px;color:var(--ink-mid);margin-bottom:24px">Set up your Pro features below — or skip and do it later.</p>

    <div class="form-section" style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px">📅 Content themes by day</div>
      <div style="font-size:12px;color:var(--ink-mid);margin-bottom:14px">Each day has a focus. Customise or leave as defaults.</div>
      <div class="days-theme-grid" style="display:flex;flex-direction:column;gap:8px">
        ${DAYS.map(d => `
        <div class="day-theme-card active" style="display:flex;align-items:center;gap:12px;border:1.5px solid var(--blue);border-radius:10px;padding:12px 16px;background:var(--blue-dim)">
          <div style="font-size:13px;font-weight:700;color:var(--ink);width:40px;flex-shrink:0">${d}</div>
          <select class="form-select" onchange="window.proSetup.dayThemes['${d}']=this.value">
            ${DAY_THEMES.map(t => `<option value="${t}" ${defaultThemes[d]===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>`).join('')}
      </div>
    </div>

    <div class="form-section" style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px">📷 Your photo library</div>
      <div style="font-size:12px;color:var(--ink-mid);margin-bottom:12px">Connect your Google Drive folder. Share it with posst-sheets-bot@posst-app.iam.gserviceaccount.com as Viewer first.</div>
      <div style="display:flex;gap:8px;margin-bottom:4px">
        <input id="portal-drive-url" class="form-input" style="flex:1;font-size:13px" placeholder="https://drive.google.com/drive/folders/..." oninput="window.proSetup.driveUrl=this.value;window.proSetup.driveValidated=false;document.getElementById('portal-drive-status').innerHTML=''">
        <button onclick="testDriveInPortal()" id="portal-drive-btn" class="btn btn-secondary btn-sm">🔗 Test</button>
      </div>
      <div id="portal-drive-status" style="font-size:12px;margin-top:6px"></div>
    </div>

    <button class="btn btn-primary btn-full" onclick="saveProSetup()" id="pro-save-btn" style="margin-bottom:10px">Save & finish setup →</button>
    <button onclick="skipProSetup()" class="btn btn-secondary btn-full">Skip for now — I'll set this up later</button>
  `;
}

async function testDriveInPortal() {
  const url = (document.getElementById('portal-drive-url')?.value||'').trim();
  const status = document.getElementById('portal-drive-status');
  const btn = document.getElementById('portal-drive-btn');
  if (!url || !url.includes('drive.google.com')) {
    if(status) status.innerHTML = '<span style="color:var(--red)">Please paste a valid Google Drive folder link</span>';
    return;
  }
  if(btn) { btn.disabled=true; btn.textContent='Checking...'; }
  if(status) status.innerHTML = '<span style="color:var(--ink-light)">☕ Grab a coffee — this can take up to a minute...</span>';
  window.proSetup.driveValidated = false;
  try {
    const resp = await fetch(VPS_URL + '/validate_drive', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({drive_url: url})
    });
    const result = await resp.json();
    if (result.valid) {
      window.proSetup.driveValidated = true;
      window.proSetup.driveStructure = result.structure || [];
      if(status) status.innerHTML = '<span style="color:var(--green);font-weight:600">✅ Connected — ' + (result.folder_name||'folder found') + '</span>';
    } else {
      if(status) status.innerHTML = '<span style="color:var(--red)">❌ ' + (result.error||'Could not access folder') + '</span>';
    }
  } catch(e) {
    if(status) status.innerHTML = '<span style="color:var(--red)">❌ Connection error</span>';
  }
  if(btn) { btn.disabled=false; btn.textContent='🔗 Test'; }
}

async function saveProSetup() {
  const btn = document.getElementById('pro-save-btn');
  if(btn) { btn.disabled=true; btn.textContent='Saving...'; }
  try {
    const driveCategories = (window.proSetup.driveStructure||[]).map(cat => ({
      name: cat.name, day: window.proSetup.driveAssignments?.[cat.name] || '', subcategories: (cat.subcategories||[]).map(s => typeof s==='string'?s:s.name).filter(Boolean)
    }));
    const driveIntent = window.proSetup.driveUrl ? 'now' : 'later';
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'save_pro_setup',
        client_id: clientData.client_id,
        day_themes: window.proSetup.dayThemes,
        google_drive_url: window.proSetup.driveUrl,
        drive_categories: JSON.stringify(driveCategories),
        google_drive_intent: driveIntent
      })
    });
    clientData.plan = 'Pro';
    if (window.proSetup.driveUrl) clientData.google_drive_url = window.proSetup.driveUrl;
    showProSetupComplete(driveIntent);
  } catch(e) {
    if(btn) { btn.disabled=false; btn.textContent='Save & finish setup →'; }
    alert('Connection error. Please try again.');
  }
}

function skipProSetup() {
  clientData.plan = 'Pro';
  renderDashboard();
}

function showProSetupComplete(driveIntent) {
  document.getElementById('dashboard').innerHTML = `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <h2 style="font-family:var(--serif);font-size:24px;margin-bottom:10px">You're all set on Pro!</h2>
      <p style="font-size:14px;color:var(--ink-mid);margin-bottom:24px;line-height:1.6">${driveIntent==='now'?'Your photo library is connected. Real photos will be used in your next posts.':'Your Pro features are active. You can connect your photo library anytime from your account.'}</p>
      <button class="btn btn-primary" onclick="renderDashboard()">Go to my account →</button>
    </div>`;
}
</script>
